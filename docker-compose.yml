version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: pos-mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: pos_system_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: posuser
      MYSQL_PASSWORD: pospassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7.0-alpine
    container_name: pos-redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./pos-backend
      dockerfile: Dockerfile
    container_name: pos-backend-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/pos_system_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=posuser
      - DB_PASSWORD=pospassword
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - pos-network

  frontend:
    build:
      context: ./pos-frontend
      dockerfile: Dockerfile
    container_name: pos-frontend-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
