<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
    <defs>
        <linearGradient id="grad-Office" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#grad-Office)" />
    <g transform="translate(200, 100)" text-anchor="middle">
        <text y="-20" font-family="system-ui, -apple-system, sans-serif" font-size="54" filter="url(#shadow)">📎</text>
        <text y="35" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="20" fill="#ffffff" letter-spacing="2" filter="url(#shadow)">OFFICE</text>
    </g>
</svg>